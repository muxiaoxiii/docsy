name: Build desktop packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            os: macos-14
            command: npm run tauri:build:mac
            artifacts: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows-x64
            os: windows-latest
            command: npm run tauri:build:windows
            artifacts: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: bash
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set audit false
          npm config set fund false
          for attempt in 1 2 3; do
            npm ci && exit 0
            sleep $((attempt * 10))
          done
          npm ci

      - name: Install external tools on macOS
        if: runner.os == 'macOS'
        run: brew install qpdf poppler ffmpeg

      - name: Install external tools on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $toolsRoot = Join-Path $env:RUNNER_TEMP "docsy-tools"
          New-Item -ItemType Directory -Force $toolsRoot | Out-Null

          function Install-ZipTool {
            param(
              [string] $Name,
              [string[]] $Urls,
              [string[]] $Executables
            )
            $zipPath = Join-Path $toolsRoot "$Name.zip"
            $dest = Join-Path $toolsRoot $Name
            $downloaded = $false
            foreach ($url in $Urls) {
              for ($attempt = 1; $attempt -le 3; $attempt++) {
                try {
                  Invoke-WebRequest -Uri $url -OutFile $zipPath
                  $downloaded = $true
                  break
                } catch {
                  if ($attempt -eq 3) {
                    Write-Warning "$Name download failed from $url"
                  } else {
                    Start-Sleep -Seconds ($attempt * 5)
                  }
                }
              }
              if ($downloaded) { break }
            }
            if (-not $downloaded) {
              throw "$Name download failed from all mirrors"
            }
            Expand-Archive -Path $zipPath -DestinationPath $dest -Force
            foreach ($exe in $Executables) {
              $match = Get-ChildItem -Path $dest -Recurse -Filter $exe | Select-Object -First 1
              if (-not $match) {
                throw "$Name package does not contain $exe"
              }
              Add-Content -Path $env:GITHUB_PATH -Value $match.DirectoryName
            }
          }

          Install-ZipTool `
            -Name "qpdf" `
            -Urls @("https://github.com/qpdf/qpdf/releases/download/v12.3.2/qpdf-12.3.2-msvc64.zip") `
            -Executables @("qpdf.exe")

          Install-ZipTool `
            -Name "poppler" `
            -Urls @("https://github.com/oschwartz10612/poppler-windows/releases/download/v26.02.0-0/Release-26.02.0-0.zip") `
            -Executables @("pdftoppm.exe", "pdftotext.exe")

          Install-ZipTool `
            -Name "ffmpeg" `
            -Urls @(
              "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip",
              "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
            ) `
            -Executables @("ffmpeg.exe", "ffprobe.exe")

      - name: Build frontend
        shell: bash
        run: |
          npm run build
          echo "=== dist contents ==="
          ls -la dist/ 2>/dev/null || echo "ERROR: dist/ does not exist!"
          echo "=== dist/index.html ==="
          cat dist/index.html 2>/dev/null || echo "ERROR: index.html missing!"

      - name: Run frontend tests
        run: npm run test -- --run

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Build package
        run: ${{ matrix.command }}

      - name: Verify macOS package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          DMG_PATH="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$APP_PATH"
          test -n "$DMG_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          hdiutil verify "$DMG_PATH"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: docsy-${{ matrix.platform }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error
